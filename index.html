
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>UniTee</title>
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				height: 100%;
				margin: 0;
			}

			body {
				display: grid;
				place-items: center;
				background: #ffffff;
				color: #0f172a;
				font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
			}

			h1 {
				font-size: clamp(3rem, 12vw, 8rem);
				letter-spacing: 0.08em;
				text-transform: uppercase;
				margin: 0;
			}
		</style>
	</head>
	<body>
		<h1>UniTee</h1>
	</body>
</html>
